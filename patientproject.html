<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <body>
 
  <h1>Patient Registration Form</h1>
  <p>Please fill in your details below to register as a patient.</p>
 
  <form>
    <label for="name">Full Name</label> <br>
    <input type="text" id="name" name="full_name" placeholder="Enter your full name" required /> <br>

    <label for="gender"> Gender</label> <br>
    <input type="gender" id="gender" name="gender" placeholder="What is your gender" required /> <br>
 
    <label for="email">Email Address</label> <br>
    <input type="email" id="email" name="email" placeholder="Enter your email" required /> <br>
 
    <label for="phone">Phone Number</label> <br>
    <input type="tel" id="phone" name="phone" placeholder="e.g. +254 712 345 678" required /> <br>
 
    <label for="dob">Date of Birth</label> <br>
    <input type="date" id="dob" name="date_of_birth" required /> <br>
 
    <button type="submit">Submit</button> <br>
  </form>
</body>
</html>
